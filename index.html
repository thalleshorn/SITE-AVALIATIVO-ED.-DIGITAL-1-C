<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tipos de Café</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- HEADER -->
    <header role="banner">
        <h1>☕ Guia dos Tipos de Café</h1>

        <nav aria-label="Navegação principal">
            <button id="increaseFont">A+</button>
            <button id="decreaseFont">A-</button>
            <button id="toggleContrast">Alto Contraste</button>
        </nav>
    </header>

    <!-- MAIN -->
    <main role="main">

        <!-- HERO -->
        <section class="hero" aria-labelledby="hero-title">
            <h2 id="hero-title">Descubra os sabores do café</h2>
            <p>Conheça os principais tipos de café e suas características únicas.</p>
        </section>

        <!-- CARDS DINÂMICOS -->
        <section id="coffee-list" aria-labelledby="coffee-title">
            <h2 id="coffee-title">Tipos de Café</h2>
            <div class="grid" id="coffeeContainer"></div>
        </section>

        <!-- CARROSSEL -->
        <section aria-labelledby="carousel-title">
            <h2 id="carousel-title">Galeria de Cafés</h2>

            <div class="carousel" aria-roledescription="carousel">
                <button class="prev" aria-label="Anterior">◀</button>
                <div class="carousel-track" id="carouselTrack"></div>
                <button class="next" aria-label="Próximo">▶</button>
            </div>
        </section>

        <!-- ACORDEÃO -->
        <section aria-labelledby="faq-title">
            <h2 id="faq-title">Curiosidades</h2>

            <div class="accordion" id="accordionContainer"></div>
        </section>

    </main>

    <!-- FOOTER -->
    <footer role="contentinfo">
        <p>© 2026 - Guia do Café</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
